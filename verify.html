<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExeReversDowloaders — Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<canvas id="particles"></canvas>
<div class="scanlines"></div>
<div class="page-wrapper">
  <header class="site-header">
    <div class="logo-wrap">
      <a href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:10px">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">ExeRevers<span class="accent">DL</span></span>
      </a>
    </div>
    <div class="header-badge">SECURE VAULT</div>
  </header>
  <section class="hero" style="padding-top:60px">
    <div class="hero-glow"></div>
    <div class="hero-content" style="max-width:560px">
      <div class="step-badge" data-i18n="step2"></div>
      <h1 class="hero-title" style="font-size:clamp(1.8rem,4vw,2.8rem)">
        ENTER <span class="red-glow">PASSWORD</span>
      </h1>
      <div class="subscribe-box" style="padding:2rem">
        <div class="sub-header">
          <div class="pulse-dot"></div>
          <span data-i18n="vault_label"></span>
        </div>
        <div class="pw-input-wrap">
          <input type="password" id="pwInput" class="pw-input" data-i18n="pw_placeholder" maxlength="64" autocomplete="off" spellcheck="false">
          <button class="pw-toggle" onclick="togglePw()">👁</button>
        </div>
        <div id="pwError" class="pw-error" style="display:none"></div>
        <div id="pwLoading" class="pw-loading" style="display:none">
          <div class="spinner"></div> <span data-i18n="pw_verifying"></span>
        </div>
        <button id="verifyBtn" class="btn-verified" style="margin-top:1rem;opacity:1;cursor:pointer" onclick="checkPassword()">
          <span>🔓</span> <span data-i18n="pw_btn"></span>
        </button>
        <p style="margin-top:1.2rem;font-size:.8rem;color:var(--text-muted);text-align:center">
          <span data-i18n="pw_no_pw"></span> <a href="https://youtube.com/@exerevers?si=ewbTDfc8mxH0znW6" target="_blank" style="color:var(--red)" data-i18n="pw_watch"></a>
        </p>
      </div>
      <div id="attemptWarn" class="attempt-warn" style="display:none"></div>
    </div>
  </section>
</div>
<script src="assets/app.js"></script>
</body>
</html>
